# Fly.io config for the Go realtime service.
# Deploy:  cd realtime && fly launch --no-deploy   (first time, edit app name)
#          fly deploy
# Then set NEXT_PUBLIC_WS_URL=wss://<app>.fly.dev/ws on Vercel.

app = "tada-realtime"
primary_region = "sin" # Singapore — closest to Thailand

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # ALLOWED_ORIGINS = "https://tadachaipanya.com,https://www.tadachaipanya.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
